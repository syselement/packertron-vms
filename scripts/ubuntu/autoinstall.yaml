#cloud-config
#
# Do not alter first line of this file.
# https://cloudinit.readthedocs.io/en/latest/
# https://github.com/canonical/cloud-init/tree/main/doc/examples
#
# For autoinstall specific documentation see:
# https://canonical-subiquity.readthedocs-hosted.com/en/latest/reference/autoinstall-reference.html
#
# This file is used by cloud-init to perform an unattended installation of Ubuntu 26.04 Desktop.
#
# Customize username, password, timezone, keyboard layout, ssh authorized keys and other settings as needed.
#

autoinstall:
  # version is an Autoinstall required field.
  version: 1

  # Configure locale, keyboard and timezone
  locale: en_GB
  keyboard:
    layout: it
  timezone: Europe/Rome

  # Set the installation source
  # IMPORTANT: verify this value from the ISO at: casper/install-sources.yaml
  source:
    id: ubuntu-desktop

  # Configure the storage layout
  storage:
    layout:
      name: lvm
      sizing-policy: all

  # Configure the initial user for the system and hostname
  # Password needs to be generated with
  #   openssl passwd -6 -stdin <<< 'packer'
  # or
  #   mkpasswd -m sha-512 packer
  identity:
    hostname: systhinx
    username: syselement
    password: "$6$OxXY0.ndy/Q1c4mU$A6QNNCNXD24WVyJXm5gpHd5tq7tjLhJKAf1wAoG0yjsFdO0vFCs02JBtKRUqT0ivHXDdzFtKhs66jvL/x0rKM1" # password: packer

  # Configure OpenSSH server - install (Internet access is required) and configure authorized keys
  ssh:
    install-server: true
    authorized-keys:
      - ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIPA3hxPOnJAjCFoZMz8mcT+fZTy5j0vjLWPGVM2vaA88
    allow-pw: true

  # Packages to install (via apt-get install) and 
  packages:
    - ca-certificates
    - git

  user-data:
    write_files:
      - path: /usr/local/sbin/packertron-firstboot
        owner: root:root
        permissions: '0750'
        content: |
          #!/usr/bin/env bash
          set -Eeuo pipefail

          REPO_URL="https://github.com/syselement/packertron-vms.git"
          REPO_BRANCH="main"
          REPO_DIR="/opt/packertron-vms"
          LOG_FILE="/var/log/packertron-firstboot.log"

          exec > >(tee -a "$LOG_FILE") 2>&1

          if [[ -f /var/lib/packertron-bootstrap/complete ]]; then
            echo "Packertron bootstrap already completed"
            exit 0
          fi

          echo "Waiting for GitHub connectivity..."

          reachable=false
          for attempt in $(seq 1 30); do
            if git ls-remote "$REPO_URL" HEAD >/dev/null 2>&1; then
              reachable=true
              break
            fi

            echo "GitHub unavailable; retry ${attempt}/30"
            sleep 10
          done

          if [[ "$reachable" != true ]]; then
            echo "ERROR: GitHub remained unreachable" >&2
            exit 1
          fi

          if [[ -d "$REPO_DIR/.git" ]]; then
            echo "Updating managed repository checkout"
          else
            echo "Cloning managed repository checkout"
            install -d -m 0755 "$(dirname "$REPO_DIR")"
            git clone "$REPO_URL" "$REPO_DIR"
          fi

          # /opt/packertron-vms is a root-managed deployment checkout.
          # Do not store manual edits inside it.
          git -C "$REPO_DIR" fetch --prune origin
          git -C "$REPO_DIR" checkout -B "$REPO_BRANCH" "origin/$REPO_BRANCH"
          git -C "$REPO_DIR" reset --hard "origin/$REPO_BRANCH"

          exec \
            "$REPO_DIR/scripts/ubuntu/90-bootstrap-baremetal.sh"

    runcmd:
      - ["/usr/local/sbin/packertron-firstboot"]

  # Update the APT package database and upgrade installed packages automatically on first boot
  # package_update: true
  # package_upgrade: true

  # Shell commands to run after the installation has completed successfully and any updates and packages installed, just before the system reboots
  # The commands are run in the installer environment with the installed system mounted at /target
  late-commands:
    - curtin in-target -- truncate -s 0 /etc/machine-id /var/lib/dbus/machine-id
    - echo 'syselement ALL=(ALL) NOPASSWD:ALL' > /target/etc/sudoers.d/99-syselement
    - chmod 0440 /target/etc/sudoers.d/99-syselement


# Validate this file with
# `sudo cloud-init schema --config-file user-data --annotate`
# or
# `sudo cloud-init schema --config-file autoinstall.yaml --annotate`
